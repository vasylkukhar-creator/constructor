  let h=`<div class="logo">FABU Creative</div><h1>Конструктор креативів</h1><p class="subtitle">Збери сторіборд з перевірених модулів вінерів</p>`;

  // 1. PLATFORM
  h+=`<div class="section"><span class="label">1. Платформа</span><div class="grid">
<button class="chip ${isAL?'sel-purple':''}" onclick="set('platform','applovin');set('placement','rewarded');set('dur',45)"><strong>AppLovin</strong><span class="badge badge-al">Rewarded / Interstitial</span><div class="chip-sub">Sound ON · Хук першим · 40–60с</div></button>
<button class="chip ${iM?'sel-teal':''}" onclick="set('platform','meta');set('placement',null);set('dur',20)"><strong>Meta Ads</strong><span class="badge badge-m">Feed / Stories / Reels</span><div class="chip-sub">Sound OFF · Хук 0–3с = все · 15–30с</div></button>
</div></div>`;

  if(!s.platform){document.getElementById('app').innerHTML=h;return}

  // PLACEMENT (AL only)
  if(isAL){
    h+=`<div class="section"><span class="label">Плейсмент</span><div class="grid">
<button class="chip ${s.placement==='rewarded'?'sel-purple':''}" onclick="set('placement','rewarded');set('dur',45)"><strong>Rewarded</strong><div class="chip-sub">40–60с</div></button>
<button class="chip ${s.placement==='interstitial'?'sel-purple':''}" onclick="set('placement','interstitial');set('dur',15)"><strong>Interstitial</strong><div class="chip-sub">12–15с</div></button>
</div></div>`;
    if(s.placement==='rewarded'){
      h+=`<div class="section"><span class="label">Тривалість</span><div class="grid">
<button class="chip ${s.dur===40?'sel-purple':''}" onclick="set('dur',40)"><strong>40с</strong></button>
<button class="chip ${s.dur===45?'sel-purple':''}" onclick="set('dur',45)"><strong>45с</strong><div class="chip-sub">дефолт</div></button>
<button class="chip ${s.dur===60?'sel-purple':''}" onclick="set('dur',60)"><strong>60с</strong><div class="chip-sub">Spirit Animal / narrative</div></button>
</div></div>`;
    }
  }
  if(iM){
    h+=`<div class="section"><span class="label">Тривалість</span><div class="grid">
<button class="chip ${s.dur===15?'sel-teal':''}" onclick="set('dur',15)"><strong>15с</strong></button>
<button class="chip ${s.dur===20?'sel-teal':''}" onclick="set('dur',20)"><strong>20с</strong><div class="chip-sub">золотий стандарт</div></button>
<button class="chip ${s.dur===25?'sel-teal':''}" onclick="set('dur',25)"><strong>25с</strong></button>
<button class="chip ${s.dur===30?'sel-teal':''}" onclick="set('dur',30)"><strong>30с</strong><div class="chip-sub">макс</div></button>
</div></div>`;
  }

  // FORMAT
  h+=`<div class="section"><span class="label">Формат</span><div class="grid">${FORMATS.map(f=>`<button class="chip ${s.format===f.id?'sel-purple':''}" onclick="tog('format','${f.id}')">${f.icon} <strong>${f.name}</strong> ${'⭐'.repeat(f.r)}<div class="chip-sub">${f.desc}</div></button>`).join('')}</div></div>`;

  // PAIN
  h+=`<div class="section"><span class="label">Pain angle</span><div class="grid">${PAINS.map(p=>`<button class="chip ${s.pain===p.id?'sel-red':''}" onclick="tog('pain','${p.id}')">${p.emoji} ${p.name}</button>`).join('')}</div></div>`;

  // ARCHETYPE
  h+=`<div class="section"><span class="label">Архетип (опційно)</span><div class="arch-row">
<div class="arch-col"><div class="arch-label">Я є (правильний):</div><div class="grid">${ARCHETYPES.map(a=>`<button class="chip ${s.aF===a.id?'sel-green':''}" onclick="tog('aF','${a.id}')">${a.name}</button>`).join('')}</div></div>
<div class="arch-arrow">→</div>
<div class="arch-col"><div class="arch-label">Жила як (неправильний):</div><div class="grid">${ARCHETYPES.map(a=>`<button class="chip ${s.aT===a.id?'sel-danger':''}" onclick="tog('aT','${a.id}')">${a.name}</button>`).join('')}</div></div></div>
${s.aF&&s.aT?(combo?`<div class="combo-note ${combo.st.includes('⬜')?'combo-orange':'combo-green'}">${combo.st} — ${combo.note}</div>`:`<div class="combo-note combo-orange">⬜ Біла пляма — потенційно нова комбінація</div>`):''}
</div>`;

  // HOOK
  h+=`<div class="section"><span class="label">Хук</span><div class="grid">${Object.entries(HOOKS).map(([t,d])=>`<button class="chip ${s.hType===t?'sel-yellow':''}" onclick="S.hType='${t}';S.hook=HOOKS['${t}'].items[0];S.show=false;render();">${d.label}</button>`).join('')}</div>
${s.hType?`<div style="margin-top:12px"><div class="arch-label">Вибери хук:</div><div class="col">${HOOKS[s.hType].items.map(x=>`<button class="chip ${s.hook===x?'sel-yellow':''}" onclick="S.hook=this.dataset.h;S.show=false;render();" data-h="${x.replace(/"/g,'&quot;')}">"${x}"</button>`).join('')}</div></div>`:''}</div>`;

  // ENDCARD
  h+=`<div class="section"><span class="label">End Card</span><div class="grid">${ENDCARDS.map(e=>`<button class="chip ${s.ec===e.id?'sel-blue':''}" onclick="set('ec','${e.id}')"><strong>${e.name}</strong> CTR ${e.ctr}<div class="chip-sub">${e.desc}</div></button>`).join('')}</div></div>`;

  // CTA
  h+=`<div class="section"><span class="label">CTA</span><div class="col">${CTAS.map(c=>`<button class="chip ${s.cta===c?'sel-teal':''}" onclick="set('cta','${c.replace(/'/g,"\\'")}')">"${c}"</button>`).join('')}</div></div>`;

  // GENERATE
  h+=`<button class="btn-gen ${ok?'on':'off'}" onclick="${ok?'S.show=true;render();':''}">${ok?'⚡ Згенерувати сторіборд':'Вибери платформу, формат, pain і хук'}</button>`;

  // STORYBOARD
  if(s.show&&ok){
    const sb=gen();const fm=FORMATS.find(x=>x.id===s.format);const pn=PAINS.find(x=>x.id===s.pain);const ec=ENDCARDS.find(x=>x.id===s.ec);
    const dur=isAL&&s.placement==='interstitial'?'12-15с':s.dur+'с';
    h+=`<div class="sb"><div class="sb-head"><div><div class="sb-title">Сторіборд</div><div class="sb-meta">${iM?'Meta':'AppLovin'} · ${dur} · ${fm?.icon} ${fm?.name} · ${pn?.emoji} ${pn?.name}</div></div>
<button class="btn-copy" id="cpB" onclick="copyAll()">📋 Копіювати бриф</button></div>
<div style="overflow-x:auto"><table class="sbt"><thead><tr><th>#</th><th>Блок</th><th>Час</th><th>VO</th><th>Візуал</th><th>Звук</th></tr></thead><tbody>
${sb.map((r,i)=>`<tr class="${r.c}"><td class="n">${i+1}</td><td class="bl">${r.lb}</td><td class="tm">${r.t}</td><td class="vo">${r.vo}</td><td class="vi">${r.vi}</td><td class="sn">${r.sn}</td></tr>`).join('')}
</tbody></table></div>
<div class="ec-bar"><div class="ec-lbl">END CARD</div><div style="font-size:13px">${ec?.name} — ${ec?.desc}</div></div>
<div class="ck-bar"><strong>Чеклист:</strong> 9:16 .mp4 · Субтитри burn-in · CTA в кадрі · End card · ${iM?'Sound-off — subtitle first':'Sound ON — audio обов\'язковий'} · Reframe ✓ · Pain↔Result mirror ✓</div>
</div>`;
  }

  // REMIX NOTE
  h+=`<div class="info" style="margin-top:48px">🔄 <strong>Ремікс вінера:</strong> скинь сторіборд (картинки/відео) + pain angles в чат Claude у проекті FABU. Claude прочитає кадри і видасть варіанти в .md для Notion.</div>`;

  document.getElementById('app').innerHTML=h;
}
render();
</script>
</body>
</html>
