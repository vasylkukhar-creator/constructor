function handleImageUpload(e) {
  const files = Array.from(e.target.files);
  const promises = files.map(file => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => {
      const base64 = r.result.split(",")[1];
      const type = file.type || "image/jpeg";
      res({ base64, type, name: file.name });
    };
    r.onerror = () => rej(new Error("Read failed"));
    r.readAsDataURL(file);
  }));
  Promise.all(promises).then(imgs => {
    state.remixImages = [...state.remixImages, ...imgs];
    state.showResult = false;
    render();
  });
}

function removeImage(idx) { state.remixImages.splice(idx, 1); render(); }

TASK: ${hasImages ? "Look at these storyboard frames and read the text on each one." : ""} Create ${state.remixPains.length} new script variant(s). Keep the SAME number of frames and the SAME visual structure (B&W frames stay B&W, color frames stay color). Only change the VO text.

${hasText ? `ADDITIONAL INSTRUCTIONS FROM THE USER:\n${state.remixInput}` : ""}

PAIN ANGLES FOR NEW VARIANTS: ${painNames}

DETAILS FOR EACH PAIN:
${painDetails}

RULES:
- Each VO line max 12 words
- Pain and result must be MIRROR: if pain = "couldn't wash dishes", result = "kitchen was clean by noon"
- Include mandatory reframe: "I'm not broken — I just didn't know my system" or variation
- Include FABU archetype test as the turning point
- CTA from this list ONLY: "Take the free test" / "Take the quiz" / "Find your archetype. Free." / "Take the test now and reset your life" / "Let the change start on its own"
- No medical claims ("cures", "treats", "diagnoses")
- Skeptical tone converts better for 45+ USA: "I didn't expect much. But it felt different."
- End card: question or soft CTA

OUTPUT: Return ONLY valid JSON, no markdown, no backticks:
[{"title":"Variant name","pain":"pain angle","frames":[{"num":1,"phase":"B&W","vo":"text"},{"num":2,"phase":"Color","vo":"text"},...]}]`;

  // Build messages content
  let content = [];
  if (hasImages) {
    state.remixImages.forEach((img, i) => {
      content.push({ type: "image", source: { type: "base64", media_type: img.type, data: img.base64 } });
    });
  }
  content.push({ type: "text", text: systemText });

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        messages: [{ role: "user", content: content }]
      })
    });
    const data = await resp.json();
    const text = data.content?.map(c => c.text || "").join("") || "";
    const clean = text.replace(/```json|```/g, "").trim();
    state.remixResults = JSON.parse(clean);
  } catch (e) {
    state.remixError = "Помилка генерації: " + e.message;
  }
  state.remixLoading = false;
  render();
}

function copyRemixAsMarkdown() {
  if (!state.remixResults) return;
  let md = `# Ремікс вінера — ${state.remixPains.length} варіант(и)\n\nОригінал: ${state.remixInput.split("\n").length} кадрів. Візуал незмінний.\n\n---\n\n`;
  state.remixResults.forEach((v, vi) => {
    md += `## Варіант ${String.fromCharCode(65+vi)} — ${v.title}\n\nPain: ${v.pain}\n\n| # | Фаза | VO (англійська) |\n|---|------|----------------|\n`;
    v.frames.forEach(f => { md += `| ${f.num} | ${f.phase} | ${f.vo} |\n`; });
    md += `\n---\n\n`;
  });
  navigator.clipboard.writeText(md).then(() => {
    document.getElementById('copyRemixBtn').textContent = '✅ Скопійовано для Notion!';
    setTimeout(() => { document.getElementById('copyRemixBtn').textContent = '📋 Копіювати як Markdown'; }, 2000);

}

function generateStoryboard() {
  const s = state;
  const painData = PAINS.find(p => p.id === s.pain);
  const fromA = ARCHETYPES.find(a => a.id === s.archFrom);
  const toA = ARCHETYPES.find(a => a.id === s.archTo);
  const isR = s.placement === "rewarded" || s.placement === "rewarded45";
  const is45 = s.placement === "rewarded45";
  const fmt = s.format;

  const pn = painData?.pain || ["Chaos at home","Cold marriage","Burnout at work"];
  const rs = painData?.result || ["Home glowing","Passion returned","Energy back"];
  const vizP = painData?.vizPain || ["Хаос вдома","Холод у парі","Виснаження"];
  const vizR = painData?.vizResult || ["Дім сяє","Пара разом","Енергія"];

  // Format-specific visual wrappers
  const fmtViz = {
    blobby: { prefix:"Blobby персонаж — ", pain:"Камінь 'Wrong archetype' на ланцюгу. ", turn:"Камінь зменшується і зникає. Blobby усміхається.", result:"Blobby без каменя — легка хода, яскраві кольори.", soft:"Blobby стоїть на вулиці, камінь тягне вниз. Сіро." },
    sketch: { prefix:"B&W sketch — ", pain:"Чорно-біле, графічний стиль. ", turn:"B&W → КОЛІР. Різкий перехід, як промінь світла.", result:"Повний колір, тепле світло.", soft:"B&W sketch — дощ, сіре місто, самотність." },
    spirit: { prefix:"AI фото жінка + тварина — ", pain:"", turn:"Жінка + spirit animal (олень/фенікс/вовк) з'являється поруч.", result:"Жінка і тварина ідуть разом, впевнено.", soft:"Жінка сама на вулиці, без тварини, загублена." },
    symptom: { prefix:"B&W sketch кадр — ", pain:"Один симптом = один кадр. Мінімалізм. ", turn:"B&W → легше. Не повний колір, але світліше.", result:"Тепліший тон, але все ще стриманий.", soft:"Темний кадр, мінімалістичний текст." },
    match: { prefix:"Pixar 3D пара — ", pain:"", turn:"Серія пар архетипів з описом.", result:"Pixar пара — щаслива, кінематографічна.", soft:"B&W Pixar — пара в ліжку, спинами." },
    runway: { prefix:"Pixar 3D runway — ", pain:"Темний Pixar, пригнічена жінка. ", turn:"Runway show: архетипи як моделі на подіумі.", result:"Яскравий Pixar, кожен архетип = 1 кадр.", soft:"Pixar жінка в темному, загублена серед натовпу." },
    cards: { prefix:"Pixar 3D split — ", pain:"Ліва сторона (wrong) = сірий Pixar. ", turn:"Split screen: wrong routine → right routine.", result:"Права сторона (right) = яскравий Pixar.", soft:"Pixar жінка, сіра версія, виснажена." },
  };
  const fv = fmtViz[fmt] || fmtViz.sketch;

  const reframe = fromA && toA
    ? `I am ${fromA.name.toUpperCase()}, but I was living as ${toA.name.toUpperCase()}.`
    : "I'm not broken — I just didn't know my system.";

  let b = [];

  // HOOK
  b.push({ cls:"row-hook", block: isR ? "🔥 ХУК" : "🔥 ХУК", time: isR ? "0–5с" : "0–3с", vo: s.selectedHook || "—", visual: fv.prefix + "Найсильніший перший кадр. Thumb-stop.", sound: isR ? "Музика починається" : "Strong sting" });

  // PAIN x3
  const t1 = isR ? (is45 ? ["5–10с","10–15с","15–20с"] : ["5–10с","10–14с","14–18с"]) : ["3–6с","6–9с","9–12с"];
  const painLabels = ["Біль 1","Біль 2","Біль 3"];
  for (let i = 0; i < 3; i++) {
    b.push({ cls:"row-pain", block: painLabels[i], time:t1[i], vo: pn[i], visual: fv.pain + vizP[i], sound: i === 2 ? "Peak tension" : "Tension builds" });
  }

  // TURN / FABU
  const t2 = isR ? (is45 ? "20–27с" : "18–22с") : "12–14с";
  b.push({ cls:"row-turn", block:"Поворот / FABU", time:t2, vo:`Then I took the FABU archetype test. ${reframe}`, visual: fv.turn + " Екран телефону → тест → результат → план.", sound:"Minor → major shift" });

  // RESULT x3 (mirror pain)
  const t3 = isR ? (is45 ? ["27–31с","31–35с","35–39с"] : ["22–24с","24–26с","26–28с"]) : ["—","—","—"];
  const isInterstitial = s.placement === "interstitial";
  if (!isInterstitial) {
    const resultLabels = ["Результат 1","Результат 2","Результат 3"];
    for (let i = 0; i < 3; i++) {
      b.push({ cls:"row-result", block: resultLabels[i], time:t3[i], vo: rs[i], visual: fv.result + " " + vizR[i], sound: i === 1 ? "Music peaks" : "Bright, hopeful" });
    }
  }

  // CTA
  const tCta = isR ? (is45 ? "39–45с" : "28–30с") : "14–15с";
  b.push({ cls:"row-cta", block: isR ? "🔥 ПІК CTA" : "CTA", time:tCta, vo: s.cta, visual: fv.prefix + "Найяскравіший кадр! FABU quiz + burn-in CTA.", sound:"Drum hit / stinger" });

  return b;
}

function chips(items, selKey, selClass, renderFn) {
  return items.map((item, i) => {

        <div class="sb-header">
          <div>
            <div class="sb-title">Сторіборд</div>
            <div class="sb-meta">${fmt?.icon} ${fmt?.name} · ${pn?.emoji} ${pn?.name} · ${pl?.name} (${pl?.dur})</div>
          </div>
          <button class="btn-copy" id="copyBtn" onclick="copyStoryboard()">📋 Копіювати бриф</button>
        </div>
        <div style="overflow-x:auto">
          <table class="sb-table">
            <thead><tr><th>#</th><th>Блок</th><th>Час</th><th>VO (англійська)</th><th>Що в кадрі</th><th>Звук</th></tr></thead>
            <tbody>
              ${sb.map((r,i) => `<tr class="${r.cls}"><td class="td-num">${i+1}</td><td class="td-block">${r.block}</td><td class="td-time">${r.time}</td><td class="td-vo">${r.vo}</td><td class="td-visual">${r.visual}</td><td class="td-sound">${r.sound}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div class="endcard-bar">
          <div class="endcard-label">END CARD</div>
          <div style="font-size:13px">${ec?.name} — ${ec?.desc}</div>
        </div>
        <div class="checklist-bar">
          <strong>Чеклист:</strong> 9:16, .mp4, ≤2MB · Субтитри burn-in · CTA вбудований в кадр · End card обов'язковий · ${isR ? 'Хук у фіналі — найяскравіший кадр останній · Не зупиняти слабкі креативи — AXON сам' : 'Хук у перші 3 сек — thumb-stop · Sound-off дефолт — subtitle-first'}
        </div>
      </div>
    `;
  }

  document.getElementById('app').innerHTML = html;
}

render();
</script>
</body>
</html>
